<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; padding: 0; }
  body {
    width: 960px; height: 540px;
    font-family: Arial, sans-serif;
    background: #0B1220;
    color: #F8FAFC;
    position: relative;
  }
  .accent-bar {
    position: absolute;
    left: 80px; top: 80px;
    width: 8px; height: 120px;
    background: #FACC15;
  }
  .tag {
    position: absolute;
    left: 112px; top: 84px;
    color: #FACC15;
  }
  .tag p {
    font-family: Arial, sans-serif;
    font-size: 14px; letter-spacing: 4px;
    margin: 0;
  }
  .titles {
    position: absolute;
    left: 112px; top: 220px;
    right: 80px;
  }
  h1 {
    font-family: Georgia, serif;
    font-size: 56px; font-weight: 700;
    margin: 0 0 16px 0;
    color: #F8FAFC;
    line-height: 1.1;
  }
  h1 .accent { color: #FACC15; }
  p.sub {
    font-family: Arial, sans-serif;
    font-size: 20px;
    margin: 0;
    color: #94A3B8;
  }
  .footer {
    position: absolute;
    left: 80px; bottom: 48px;
    right: 80px;
    display: block;
  }
  .footer-rule {
    position: absolute;
    left: 0; right: 0; top: 0;
    height: 2px;
    background: #1E293B;
  }
  .footer p {
    font-size: 12px;
    color: #64748B;
    margin: 16px 0 0 0;
    letter-spacing: 2px;
  }
</style>
</head>
<body>
  <div class="accent-bar"></div>
  <div class="tag">
    <p>BRAINCREW INTELLIGENCE / Q1 2026</p>
  </div>
  <div class="titles">
    <h1>State of <span class="accent">AI Adoption</span><br>in the Enterprise</h1>
    <p class="sub">Quarterly diffusion report — 1,240 companies surveyed across 14 sectors</p>
  </div>
  <div class="footer">
    <div class="footer-rule"></div>
    <p>REPORT NO. 2026-Q1-AI-014</p>
  </div>
</body>
</html>
