<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', 'Pretendard', sans-serif;
  background: #0a0a0a;
  color: #e0e0e0;
  min-height: 100vh;
}

/* ── Header ── */
.gallery-header {
  text-align: center;
  padding: clamp(3rem, 8vh, 6rem) 2rem clamp(2rem, 4vh, 3rem);
  max-width: 800px;
  margin: 0 auto;
}
.gallery-header h1 {
  font-family: 'Inter', sans-serif;
  font-size: clamp(2rem, 4vw, 3.2rem);
  font-weight: 700;
  letter-spacing: -0.03em;
  line-height: 1.2;
  background: linear-gradient(135deg, #fff 0%, #999 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.gallery-header p {
  margin-top: 1rem;
  font-size: clamp(0.9rem, 1.2vw, 1.05rem);
  color: #888;
  line-height: 1.6;
}
.gallery-header .count {
  display: inline-block;
  margin-top: 1.2rem;
  padding: 0.35rem 1rem;
  border: 1px solid #333;
  border-radius: 100px;
  font-size: 0.8rem;
  color: #aaa;
  letter-spacing: 0.05em;
}

/* ── Filter ── */
.filter-bar {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 0.5rem;
  padding: 0 2rem 2rem;
  max-width: 900px;
  margin: 0 auto;
}
.filter-btn {
  padding: 0.4rem 1rem;
  border: 1px solid #333;
  border-radius: 100px;
  background: transparent;
  color: #999;
  font-size: 0.8rem;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
}
.filter-btn:hover { border-color: #666; color: #fff; }
.filter-btn.active { background: #fff; color: #0a0a0a; border-color: #fff; }

/* ── Grid ── */
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(100%, 380px), 1fr));
  gap: clamp(1rem, 2vw, 1.5rem);
  padding: 0 clamp(1rem, 3vw, 3rem) clamp(3rem, 6vh, 5rem);
  max-width: 1400px;
  margin: 0 auto;
}

/* ── Card ── */
.preset-card {
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid #1f1f1f;
  background: #111;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  cursor: default;
}
.preset-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.5);
}

/* ── Preview area ── */
.preview {
  position: relative;
  height: 240px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 2rem;
}
.preview .title-text {
  font-size: 1.8rem;
  font-weight: 700;
  line-height: 1.2;
  margin-bottom: 0.5rem;
}
.preview .subtitle-text {
  font-size: 0.85rem;
  line-height: 1.5;
  opacity: 0.7;
}
.preview .accent-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 4px;
}
/* Signature elements per preset — added via specific classes */
.preview .sig-element {
  position: absolute;
}

/* ── Card info ── */
.card-info {
  padding: 1.2rem 1.5rem 1.5rem;
}
.card-info .card-name {
  font-size: 1rem;
  font-weight: 600;
  color: #fff;
  margin-bottom: 0.25rem;
}
.card-info .card-mood {
  font-size: 0.78rem;
  color: #777;
  margin-bottom: 0.8rem;
}
.card-info .card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 0.35rem;
  margin-bottom: 0.8rem;
}
.card-info .tag {
  padding: 0.2rem 0.6rem;
  border-radius: 4px;
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 0.03em;
  text-transform: uppercase;
}
.tag-dark { background: #1a1a2e; color: #8888cc; }
.tag-light { background: #f0ece4; color: #666; }
.tag-specialty { background: #1a2e1a; color: #88cc88; }
.tag-new { background: #2e1a1a; color: #cc8888; }

/* ── Palette + Font strip ── */
.palette-row {
  display: flex;
  align-items: center;
  gap: 0.4rem;
}
.swatch {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.1);
  flex-shrink: 0;
}
.font-label {
  margin-left: auto;
  font-size: 0.7rem;
  color: #555;
  text-align: right;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 160px;
}

/* ── Responsive ── */
@media (max-width: 480px) {
  .preview { height: 200px; padding: 1.5rem; }
  .preview .title-text { font-size: 1.4rem; }
}
</style>

function renderCard(p) {
  const isLightBg = isLight(p.bg);
  const previewText = isLightBg ? p.text : p.text;
  const previewSub = isLightBg ? p.textSec : p.textSec;

  // Build signature decoration
  let sigDeco = '';
  if (p.id === 'gradient-mesh' && p.meshColors) {
    sigDeco = p.meshColors.map((c, i) =>
      `<div style="position:absolute;width:120px;height:120px;border-radius:50%;background:${c};opacity:0.4;filter:blur(30px);top:${20+i*30}px;right:${-20+i*25}px;"></div>`
    ).join('');
  } else if (p.id === 'glassmorphism') {
    sigDeco = `
      <div style="position:absolute;width:140px;height:140px;border-radius:50%;background:rgba(0,212,255,0.3);filter:blur(40px);top:-30px;right:-30px;"></div>
      <div style="position:absolute;width:100px;height:100px;border-radius:50%;background:rgba(168,85,247,0.3);filter:blur(30px);bottom:-20px;left:20px;"></div>
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:70%;height:50%;border-radius:12px;backdrop-filter:blur(12px);background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);"></div>`;
  } else if (p.id === 'risograph-print' && p.risoColors) {
    sigDeco = p.risoColors.map((c, i) =>
      `<div style="position:absolute;width:70px;height:70px;border-radius:50%;background:${c};mix-blend-mode:multiply;opacity:0.6;top:${60+i*20}px;right:${20+i*22}px;"></div>`
    ).join('');
  } else if (p.id === 'neo-brutalism') {
    sigDeco = `<div style="position:absolute;top:30px;right:20px;width:80px;height:50px;background:#fff;border:4px solid #000;box-shadow:6px 6px 0 #000;border-radius:0;"></div>`;
  } else if (p.id === 'cyberpunk-outline') {
    sigDeco = `
      <div style="position:absolute;top:12px;left:12px;width:20px;height:20px;border-top:2px solid ${p.accent};border-left:2px solid ${p.accent};opacity:0.5;"></div>
      <div style="position:absolute;top:12px;right:12px;width:20px;height:20px;border-top:2px solid ${p.accent};border-right:2px solid ${p.accent};opacity:0.5;"></div>
      <div style="position:absolute;bottom:12px;left:12px;width:20px;height:20px;border-bottom:2px solid ${p.accent};border-left:2px solid ${p.accent};opacity:0.5;"></div>
      <div style="position:absolute;bottom:12px;right:12px;width:20px;height:20px;border-bottom:2px solid ${p.accent};border-right:2px solid ${p.accent};opacity:0.5;"></div>
      <div style="position:absolute;inset:0;background:radial-gradient(circle 1px, rgba(0,255,200,0.15) 1px, transparent 1px);background-size:16px 16px;opacity:0.3;"></div>`;
  } else if (p.id === 'duotone-split') {
    sigDeco = `<div style="position:absolute;top:0;right:0;width:50%;height:100%;background:${p.accent};"></div>
      <div style="position:absolute;top:0;left:50%;transform:translateX(-50%);width:2px;height:100%;background:rgba(255,255,255,0.3);"></div>`;
  } else if (p.id === 'dark-botanical') {
    sigDeco = `
      <div style="position:absolute;width:100px;height:100px;border-radius:50%;background:rgba(212,165,116,0.15);filter:blur(25px);top:20px;right:10px;"></div>
      <div style="position:absolute;width:70px;height:70px;border-radius:50%;background:rgba(232,180,184,0.12);filter:blur(20px);bottom:40px;right:60px;"></div>`;
  } else if (p.id === 'terminal-green') {
    sigDeco = `<div style="position:absolute;inset:0;background:repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);pointer-events:none;"></div>`;
  } else if (p.id === 'neon-cyber') {
    sigDeco = `<div style="position:absolute;width:120px;height:120px;border-radius:50%;background:rgba(0,255,204,0.12);filter:blur(30px);top:-20px;right:20px;"></div>`;
  } else if (p.id === 'dark-academia') {
    sigDeco = `<div style="position:absolute;inset:16px;border:1px solid rgba(201,168,76,0.2);pointer-events:none;"></div>
      <div style="position:absolute;inset:22px;border:1px solid rgba(201,168,76,0.1);pointer-events:none;"></div>`;
  } else if (p.id === 'notebook-tabs') {
    sigDeco = `
      <div style="position:absolute;right:0;top:15%;width:28px;height:18%;background:#98d4bb;border-radius:4px 0 0 4px;"></div>
      <div style="position:absolute;right:0;top:38%;width:28px;height:18%;background:#c7b8ea;border-radius:4px 0 0 4px;"></div>
      <div style="position:absolute;right:0;top:61%;width:28px;height:18%;background:#f4b8c5;border-radius:4px 0 0 4px;"></div>`;
  } else if (p.id === 'swiss-modern') {
    sigDeco = `
      <div style="position:absolute;top:20px;right:20px;width:50px;height:50px;border:2px solid #ff3300;border-radius:50%;"></div>
      <div style="position:absolute;bottom:30px;right:50px;width:30px;height:30px;background:#ff3300;"></div>`;
  } else if (p.id === 'bento-grid') {
    sigDeco = `
      <div style="position:absolute;top:20px;right:20px;display:grid;grid-template-columns:1fr 1fr;gap:6px;width:80px;">
        <div style="background:#1E293B;border-radius:8px;height:35px;grid-column:span 2;"></div>
        <div style="background:#FFD60A;border-radius:8px;height:25px;"></div>
        <div style="background:#14B8A6;border-radius:8px;height:25px;"></div>
      </div>`;
  } else if (p.id === 'bold-signal') {
    sigDeco = `<div style="position:absolute;top:20px;right:20px;padding:4px 12px;background:${p.accent};color:#fff;font-size:11px;font-weight:700;font-family:'Space Grotesk',sans-serif;">01</div>`;
  } else if (p.id === 'electric-studio') {
    sigDeco = `<div style="position:absolute;top:0;right:60px;width:4px;height:100%;background:${p.accent};"></div>`;
  } else if (p.id === 'creative-voltage') {
    sigDeco = `<div style="position:absolute;top:15px;right:15px;padding:3px 10px;background:${p.accent};color:#000;font-size:10px;font-weight:700;border-radius:20px;font-family:'Syne',sans-serif;">NEON</div>`;
  } else if (p.id === 'pastel-geometry') {
    const pillColors = ['#f0b4d4','#a8d4c4','#5a7c6a','#9b8dc4'];
    const heights = [20,35,50,35];
    sigDeco = pillColors.map((c,i) =>
      `<div style="position:absolute;right:${12}px;top:${40+i*55}px;width:12px;height:${heights[i]}px;background:${c};border-radius:6px;opacity:0.7;"></div>`
    ).join('');
  } else if (p.id === 'split-pastel') {
    sigDeco = `<div style="position:absolute;top:0;right:0;width:50%;height:100%;background:${p.bgSec};"></div>`;
  } else if (p.id === 'vintage-editorial') {
    sigDeco = `
      <div style="position:absolute;top:25px;right:25px;width:45px;height:45px;border:2px solid ${p.text};border-radius:50%;opacity:0.2;"></div>
      <div style="position:absolute;bottom:30px;right:40px;width:40px;height:2px;background:${p.text};opacity:0.15;"></div>
      <div style="position:absolute;bottom:45px;right:55px;width:5px;height:5px;background:${p.text};border-radius:50%;opacity:0.2;"></div>`;
  } else if (p.id === 'paper-and-ink') {
    sigDeco = `<div style="position:absolute;top:18px;left:2rem;font-family:'Cormorant Garamond',serif;font-size:48px;color:${p.accent};opacity:0.2;line-height:1;">A</div>`;
  }

  // Preview background - handle special cases
  let previewBg = `background:${p.bg};`;
  if (p.id === 'gradient-mesh') {
    previewBg = `background: ${p.bg}; background-image: radial-gradient(at 20% 80%, #FF6EC7 0%, transparent 50%), radial-gradient(at 80% 20%, #7B61FF 0%, transparent 50%), radial-gradient(at 50% 50%, #00D4FF 0%, transparent 50%);`;
  } else if (p.id === 'glassmorphism') {
    previewBg = `background: linear-gradient(135deg, #1A1A4E 0%, #6B21A8 50%, #1E3A5F 100%);`;
  } else if (p.id === 'notebook-tabs') {
    previewBg = `background:${p.bgSec};`;
  }

  // Title style overrides
  let titleStyle = `color:${previewText}; font-family:${p.fontDisplay};`;
  if (p.id === 'cyberpunk-outline') {
    titleStyle += `-webkit-text-stroke:1.5px ${p.accent}; color:transparent;`;
  } else if (p.id === 'dark-academia') {
    titleStyle += `font-style:italic;`;
  } else if (p.id === 'duotone-split') {
    titleStyle += `position:relative; z-index:1;`;
  }

  return `
    <article class="preset-card" data-category="${p.category}">
      <div class="preview" style="${previewBg}">
        ${sigDeco}
        <div class="title-text" style="${titleStyle}">${p.name}</div>
        <div class="subtitle-text" style="color:${previewSub}; font-family:${p.fontBody}; position:relative; z-index:1;">${p.moodKo}</div>
        <div class="accent-bar" style="background:${p.accent};"></div>
      </div>
      <div class="card-info">
        <div class="card-name">${p.name}</div>
        <div class="card-mood">${p.mood}</div>
        <div class="card-tags">
          <span class="tag tag-${p.category}">${p.category === 'new' ? 'extended' : p.category}</span>
        </div>
        <div class="palette-row">
          <div class="swatch" style="background:${p.bg};" title="Background"></div>
          <div class="swatch" style="background:${p.accent};" title="Accent"></div>
          <div class="swatch" style="background:${p.text};" title="Text"></div>
          <div class="swatch" style="background:${p.textSec};" title="Secondary text"></div>
          <span class="font-label">${p.fontLabel}</span>
        </div>
      </div>
    </article>`;
}

function isLight(hex) {
  const c = hex.replace('#','');
  if (c.length < 6) return false;
  const r = parseInt(c.substr(0,2),16), g = parseInt(c.substr(2,2),16), b = parseInt(c.substr(4,2),16);
  return (r*299 + g*587 + b*114) / 1000 > 140;
}

// Render all
const grid = document.getElementById('grid');
grid.innerHTML = presets.map(renderCard).join('');

// Filter
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const f = btn.dataset.filter;
    document.querySelectorAll('.preset-card').forEach(card => {
      card.style.display = (f === 'all' || card.dataset.category === f) ? '' : 'none';
    });
  });
});
</script>
</body>
</html>
